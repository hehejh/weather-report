spring:
  application:
    name: photo-weather-assistant
  task:
    scheduling:
      pool:
        size: 2
  datasource:
    url: jdbc:postgresql://localhost:5432/weather
    username: ${DB_USERNAME:weather}
    password: ${DB_PASSWORD:weather}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG95Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  cache:
    caffeine:
      spec: maximumSize=500,expireAfterWrite=30m
  jackson:
    default-property-inclusion: non_null
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

weather:
  mail:
    from: ${MAIL_FROM:noreply@weather-assistant.local}
    subject-prefix: "[WeatherAlert]"
  api:
    qweather:
      base-url: ${QWEATHER_API_HOST:https://mu3fc2wubf.re.qweatherapi.com/v7}
      key: ${QWEATHER_API_KEY:}
    timer7:
      base-url: http://www.7timer.info/bin

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    mail:
      enabled: false
