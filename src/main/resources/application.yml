spring:
  application:
    name: photo-weather-assistant
  task:
    scheduling:
      pool:
        size: 2
  datasource:
    url: jdbc:postgresql://localhost:5432/weather
    username: ${DB_USERNAME:weather}
    password: ${DB_PASSWORD:weather}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG95Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    caffeine:
      spec: maximumSize=500,expireAfterWrite=30m
  jackson:
    default-property-inclusion: non_null

weather:
  api:
    qweather:
      base-url: https://devapi.qweather.com/v7
      key: ${QWEATHER_API_KEY:}
    timer7:
      base-url: http://www.7timer.info/bin

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
